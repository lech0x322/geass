app = "geass-signals"
primary_region = "fra"

[build]
  dockerfile = "apps/signal_server/Dockerfile"

[env]
  PORT         = "4001"
  GEASS_API_URL   = "https://geass.app"
  ALLOWED_ORIGINS = "https://geass.app"

[http_service]
  internal_port     = 4001
  force_https       = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
